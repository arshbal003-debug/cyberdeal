<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Cyberdeal | ਸਭ ਤੋਂ ਵਧੀਆ ਡੀਲਸ</title>

    </style>
</head>
<body>
    <header>

    </header>

    <div class="product">
        <h3>Smart Watch</h3>
        <p>ਕੀਮਤ: ₹1,999</p>
        <a href="https://wa.me/91XXXXXXXXXX" class="buy-btn">ਖਰੀਦੋ</a>
    </div>

    <div class="product">
        <h3>Wireless Earbuds</h3>
        <p>ਕੀਮਤ: ₹999</p>
        <a href="https://wa.me/91XXXXXXXXXX" class="buy-btn">ਖਰੀਦੋ</a>
    </div>

</html>
